<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="FurLogic">
  <defs>
    <clipPath id="fl-logo-clip">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
    <linearGradient id="fl-logo-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F58A3E"/>
      <stop offset="100%" stop-color="#E26F1C"/>
    </linearGradient>
  </defs>
  <!-- background citrus circle -->
  <circle cx="50" cy="50" r="44" fill="url(#fl-logo-bg)"/>
  <!-- segment lines + inner ring (white at 35%) -->
  <g clip-path="url(#fl-logo-clip)" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round">
    <line x1="50" y1="6"    x2="50" y2="94"/>
    <line x1="6"  y1="50"   x2="94" y2="50"/>
    <line x1="18.6" y1="18.6" x2="81.4" y2="81.4"/>
    <line x1="81.4" y1="18.6" x2="18.6" y2="81.4"/>
    <circle cx="50" cy="50" r="30"/>
  </g>
  <!-- check white separator (creates the gap to the segment lines) -->
  <path d="M28 52 L43 67 L76 24" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- short leg: orange -->
  <path d="M28 52 L43 67" fill="none" stroke="#F4A05C" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- long leg + leaf tip: green -->
  <g class="fl-logo-leaf">
    <path d="M43 67 L76 24" fill="none" stroke="#65A30D" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M76 24 q4 -13 18 -8 q-10 13 -18 8 z" fill="#65A30D" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="80" y1="20" x2="90" y2="14" stroke="#F4A05C" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
