name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Repo-subpath base for github.io/<user>/FurLogic/.
          # When a custom domain (CNAME) is bound, remove this VITE_BASE line.
          VITE_BASE: /FurLogic/
          # Vision proxy URL — once you deploy deno/ to Deno Deploy
          # (see deno/README.md), copy the *.deno.dev URL into repo
          # Settings → Secrets and variables → Actions → Variables as
          # VISION_WORKER_URL. Leave unset to fall back to manual-only mode.
          VITE_VISION_WORKER_URL: ${{ vars.VISION_WORKER_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
