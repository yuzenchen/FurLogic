name = "furlogic-vision"
main = "src/index.js"
compatibility_date = "2026-05-01"

# Origin allow-list — comma-separated. Leave the github.io origin in for prod;
# add http://localhost:3000 for local dev. The Worker rejects everything else
# at the Origin header level (see src/index.js).
[vars]
ALLOWED_ORIGINS = "https://yuzenchen.github.io,http://localhost:3000"
GEMINI_MODEL = "gemini-2.5-flash"

# Secrets (set with `wrangler secret put GEMINI_API_KEY`):
#   GEMINI_API_KEY — get one at https://aistudio.google.com/apikey
